name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: uv sync --locked
      - run: npm ci
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      - run: npm run typecheck
      - run: npm run build

